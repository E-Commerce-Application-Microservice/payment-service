name: SonarCloud Analysis & Quality Gate

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout full git history (required by Sonar)
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Run SonarCloud analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=muvvaalaakash_payment-service
            -Dsonar.organization=muvvaalaakash
            -Dsonar.sources=.
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      # 3️⃣ Check SonarCloud Quality Gate
      - name: SonarCloud Quality Gate
        id: quality-gate
        uses: SonarSource/sonarcloud-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 4️⃣ Send email ONLY if Quality Gate fails
      - name: Send email on Quality Gate failure
        if: steps.quality-gate.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ SonarCloud Quality Gate Failed - ${{ github.repository }}"
          to: your-email@example.com
          from: GitHub Actions CI
          body: |
            ❌ SonarCloud Quality Gate FAILED

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Please review the analysis in SonarCloud.
