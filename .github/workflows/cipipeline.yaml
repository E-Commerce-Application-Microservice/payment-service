name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main
      - muvvaalaakash-ci-pipeline

env:
  IMAGE_NAME: myapp

jobs:

# 🔍 1. SONAR
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
  
      - name: Sonar Scan with Quality Gate
        run: |
          mvn clean verify sonar:sonar \
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
          -Dsonar.qualitygate.wait=true

# 🔐 2. SNYK (runs only if sonar passes)
  snyk:
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Scan
        run: snyk test --severity-threshold=high

# 🐳 3. BUILD + VERSION
  build:
    runs-on: ubuntu-latest
    needs: snyk

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          VERSION_FILE="version.txt"

          if [ ! -f $VERSION_FILE ]; then
            echo "v1.0.0" > $VERSION_FILE
          fi

          CURRENT=$(cat $VERSION_FILE)

          MAJOR=$(echo $CURRENT | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          PATCH=$((PATCH + 1))
          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"

          echo $NEW_VERSION > $VERSION_FILE

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.version.outputs.version }} .

# 🔍 4. TRIVY (only if build passed)
  trivy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Scan Image (Fail on HIGH/CRITICAL)
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}

      - name: Generate HTML Report
        if: success()
        run: |
          mkdir -p trivy-templates
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o trivy-templates/html.tpl

          trivy image \
            --format template \
            --template "trivy-templates/html.tpl" \
            --output trivy-report.html \
            ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}

# 🚀 5. PUSH (only if trivy passed)
  push:
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - name: Docker Login
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login \
          -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push Image
        run: |
          docker tag $IMAGE_NAME:${{ needs.build.outputs.version }} \
          ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ needs.build.outputs.version }}

          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ needs.build.outputs.version }}

# 📧 6. NOTIFICATION (runs ALWAYS)
  notify:
    runs-on: ubuntu-latest
    needs: [sonar, snyk, build, trivy, push]
    if: always()

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Pipeline Status: ${{ job.status }}"
          to: ${{ secrets.MAIL_TO }}
          from: CI Pipeline <${{ secrets.MAIL_USERNAME }}>
          body: |
            Pipeline Status : ${{ job.status }}
            Repo            : ${{ github.repository }}
            Commit          : ${{ github.sha }}
