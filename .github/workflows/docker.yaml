name: Build Docker Image, Scan & Email Vulnerability Report

on:
  push:
    branches:
      - main
      - muvvaalaakash-ci-pipeline

jobs:
  docker-security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myapp:${{ github.sha }} .

      - name: Cache Trivy DB
        uses: actions/cache@v3
        with:
          path: ~/.cache/trivy
          key: trivy-db

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin

      - name: Scan Docker image (HTML report)
        run: |
          mkdir -p trivy-templates
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o trivy-templates/html.tpl

          trivy image \
            --format template \
            --template "trivy-templates/html.tpl" \
            --output trivy-report.html \
            myapp:${{ github.sha }}

      - name: Fail pipeline on vulnerabilities
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            myapp:${{ github.sha }}

      - name: Email vulnerability report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Docker Vulnerability Report - ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO }}
          from: CI Scanner <${{ secrets.SMTP_USER }}>
          body: |
            Vulnerability scan completed.

            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
          attachments: trivy-report.html
